<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Madlan Lead CRM - Login</title>
<link rel="stylesheet" href="/static/css/style.css">
<style>
  .login-wrap { display: flex; align-items: center; justify-content: center; min-height: 100vh; }
  .login-box { background: white; padding: 32px; border-radius: 10px; box-shadow: 0 2px 12px rgba(0,0,0,0.12); width: 320px; }
  .login-box h1 { font-size: 18px; margin: 0 0 16px; }
  .login-box input { width: 100%; padding: 10px; margin-bottom: 12px; border: 1px solid #d0d3da; border-radius: 6px; }
  .login-box button { width: 100%; padding: 10px; background: #25d366; color: #08331b; border: none; border-radius: 6px; font-weight: 600; cursor: pointer; }
  .login-error { color: #c0392b; font-size: 13px; margin-bottom: 10px; }
</style>
</head>
<body>
<div class="login-wrap">
  <form class="login-box" method="POST">
    <h1>Madlan Lead CRM</h1>
    {% if error %}<div class="login-error">{{ error }}</div>{% endif %}
    <input type="password" name="password" placeholder="Password" autofocus required>
    <button type="submit">Enter</button>
  </form>
</div>
</body>
</html>
